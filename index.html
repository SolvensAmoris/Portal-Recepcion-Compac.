<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Tickets | 𝕾𝖔𝖑𝖛𝖊𝖓𝖘 𝕬𝖒𝖔𝖗𝖎𝖘</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://unpkg.com/tesseract.js@v4/dist/tesseract.min.js'></script>
    <style>
        :root {
            --bg-corporate: #0a0e17;
            --panel-bg: #111827;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --border-line: #374151;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-corporate);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .dashboard-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
        }
        h1 { margin-bottom: 25px; font-weight: 600; }

        .upload-zone {
            border: 2px dashed var(--border-line);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            margin-bottom: 14px;
            transition: 0.3s;
            position: relative;
        }
        .upload-zone:hover { border-color: var(--accent-blue); }
        .upload-zone i { font-size: 2rem; margin-bottom: 12px; display: block; }

        /* Preview de imagen dentro del dropzone */
        #previewImg {
            display: none;
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 6px;
            margin-top: 12px;
        }

        /* Controles de mejora de imagen */
        .img-controls {
            display: none;
            background: #1e293b;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
            text-align: left;
        }
        .img-controls label {
            font-size: 0.78rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .img-controls input[type=range] {
            width: 100%;
            accent-color: var(--accent-blue);
            margin-bottom: 10px;
        }
        .img-controls .hint {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 2px;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
        }
        .btn-submit:disabled { background: #374151; cursor: not-allowed; }
        .btn-submit:not(:disabled):hover { background: #2563eb; }

        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59,130,246,0.3);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #statusMsg {
            margin-top: 18px;
            font-size: 0.88rem;
            line-height: 1.6;
        }
        #statusMsg.ok   { color: var(--success); }
        #statusMsg.warn { color: var(--warning); }
        #statusMsg.err  { color: var(--error); }

        /* Texto OCR debug (colapsable) */
        #ocrDebug {
            display: none;
            margin-top: 14px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            text-align: left;
            font-size: 0.72rem;
            color: #64748b;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #toggleDebug {
            display: none;
            margin-top: 10px;
            background: none;
            border: none;
            color: #475569;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <h1>Captura Automática</h1>

    <div class="upload-zone" id="dropZone">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p>Toca para tomar foto del ticket</p>
        <img id="previewImg" alt="Vista previa">
        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
    </div>

    <!-- Controles de mejora -->
    <div class="img-controls" id="imgControls">
        <label>Brillo <span id="brightnessVal">100%</span></label>
        <input type="range" id="brightness" min="60" max="200" value="100">
        <label>Contraste <span id="contrastVal">100%</span></label>
        <input type="range" id="contrast" min="80" max="300" value="100">
        <p class="hint">💡 Si el ticket es muy claro, sube el contraste. Si es oscuro, sube el brillo.</p>
    </div>

    <div class="spinner" id="spinner"></div>
    <button id="uploadBtn" class="btn-submit" disabled>PROCESAR DOCUMENTO</button>

    <div id="statusMsg"></div>
    <button id="toggleDebug">Ver texto detectado por OCR</button>
    <div id="ocrDebug"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzifuu1qNextPTyKnYyZELUcwdx8SHZf3kR-5RAuh41XftqiMAB5VaIHOpvhJmrly57kA/exec";

    const fileInput    = document.getElementById('fileInput');
    const uploadBtn    = document.getElementById('uploadBtn');
    const spinner      = document.getElementById('spinner');
    const statusMsg    = document.getElementById('statusMsg');
    const dropZone     = document.getElementById('dropZone');
    const previewImg   = document.getElementById('previewImg');
    const imgControls  = document.getElementById('imgControls');
    const brightnessIn = document.getElementById('brightness');
    const contrastIn   = document.getElementById('contrast');
    const toggleDebug  = document.getElementById('toggleDebug');
    const ocrDebug     = document.getElementById('ocrDebug');

    // ----- Vista previa + habilitar controles -----
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
        if (!fileInput.files.length) return;
        const url = URL.createObjectURL(fileInput.files[0]);
        previewImg.src = url;
        previewImg.style.display = 'block';
        imgControls.style.display = 'block';
        uploadBtn.disabled = false;
        statusMsg.textContent = '';
        statusMsg.className = '';
        toggleDebug.style.display = 'none';
        ocrDebug.style.display = 'none';
    });

    // ----- Sliders de brillo/contraste -----
    brightnessIn.addEventListener('input', () => {
        document.getElementById('brightnessVal').textContent = brightnessIn.value + '%';
    });
    contrastIn.addEventListener('input', () => {
        document.getElementById('contrastVal').textContent = contrastIn.value + '%';
    });

    // ----- Toggle debug OCR -----
    toggleDebug.addEventListener('click', () => {
        ocrDebug.style.display = ocrDebug.style.display === 'none' ? 'block' : 'none';
    });

    // ===================================================
    //  PREPROCESAMIENTO DE IMAGEN EN CANVAS
    //  Aplica brillo + contraste + escala de grises
    //  para mejorar la legibilidad del OCR
    // ===================================================
    function preprocessImage(file, brightness, contrast) {
        return new Promise((resolve) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                // Escalar al doble si la imagen es pequeña (mejora OCR en fotos de baja res)
                const scale = Math.max(1, Math.min(3, 1800 / Math.max(img.width, img.height)));
                const canvas = document.createElement('canvas');
                canvas.width  = img.width  * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');

                // Fondo blanco
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Dibujar imagen
                ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) grayscale(100%)`;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                ctx.filter = 'none';

                canvas.toBlob(resolve, 'image/png');
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });
    }

    // ===================================================
    //  EXTRACCIÓN DE DATOS DEL TICKET
    //  Regex permisivos: espacios, guiones, caracteres
    //  mal reconocidos por OCR (0→O, 1→I, etc.)
    // ===================================================
    function extractTicketData(rawText) {
        // Normalizar: mayúsculas, reemplazar 0→O en zona de letras del RFC
        const text = rawText.toUpperCase();

        // RFC: 3-4 letras + 6 dígitos + 3 alfanuméricos, con posibles espacios/guiones
        const rfcRegex = /[A-Z&Ñ]{3,4}[\s\-]?[0-9]{6}[\s\-]?[A-Z0-9]{2,3}/g;
        const rfcMatches = text.match(rfcRegex) || [];
        const rfc = rfcMatches.length > 0
            ? rfcMatches[0].replace(/[\s\-]/g, '')
            : null;

        // Total: busca "TOTAL", "IMPORTE", "PAGAR" seguido de cantidad
        // Acepta $, espacios, comas o puntos como separadores
        const totalRegex = /(?:TOTAL|IMPORTE|COBRAR|PAGAR|MONTO)[^0-9$]*\$?\s*([0-9]{1,3}(?:[,\s]?[0-9]{3})*(?:[.,][0-9]{1,2})?)/i;
        const totalMatch = rawText.match(totalRegex);
        let total = null;
        if (totalMatch) {
            // Normalizar: quitar espacios, cambiar coma decimal a punto
            total = totalMatch[1].replace(/\s/g, '').replace(/,([0-9]{1,2})$/, '.$1');
        }

        // Fecha: busca dd/mm/aaaa o dd-mm-aaaa o variantes
        const fechaMatch = text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        const fecha = fechaMatch ? fechaMatch[0] : null;

        return { rfc, total, fecha };
    }

    // ===================================================
    //  PROCESAMIENTO PRINCIPAL
    // ===================================================
    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        uploadBtn.style.display = 'none';
        spinner.style.display   = 'block';
        statusMsg.className     = '';
        statusMsg.innerHTML     = '⏳ Mejorando imagen...';
        toggleDebug.style.display = 'none';
        ocrDebug.style.display    = 'none';

        try {
            // 1. Preprocesar imagen
            const brightness = parseInt(brightnessIn.value);
            const contrast   = parseInt(contrastIn.value);
            const processedBlob = await preprocessImage(file, brightness, contrast);

            statusMsg.innerHTML = '🔍 Leyendo ticket con OCR...';

            // 2. OCR con Tesseract (español + inglés para mejor detección de números)
            const { data } = await Tesseract.recognize(processedBlob, 'spa+eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,/$%&Ññ -:/',
                preserve_interword_spaces: '1',
            });

            const rawText = data.text || '';

            // Mostrar texto OCR para debug
            ocrDebug.textContent = rawText;
            toggleDebug.style.display = 'inline';

            // 3. Extraer datos
            const { rfc, total, fecha } = extractTicketData(rawText);

            // 4. Construir payload — siempre enviamos aunque RFC no se detecte
            const ticketData = {
                rfc:   rfc   || 'NO_DETECTADO',
                total: total || '0.00',
                fecha: fecha || new Date().toLocaleDateString('es-MX'),
            };

            statusMsg.innerHTML = '📡 Enviando a la matriz...';

            // 5. Enviar a Google Apps Script
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode:   'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ticketData),
            });

            // 6. Mostrar resultado
            const rfcDetectado = rfc ? `<b>${rfc}</b>` : '⚠️ No detectado (revisa el texto OCR)';
            const totalDetect  = total ? `$${total}` : '⚠️ No detectado';

            if (!rfc && !total) {
                statusMsg.className = 'warn';
                statusMsg.innerHTML = `⚠️ Datos poco claros. Se envió el registro vacío.<br>RFC: ${rfcDetectado}<br>Total: ${totalDetect}<br><br>Toca "Ver texto detectado" y verifica si el OCR leyó algo.`;
            } else if (!rfc) {
                statusMsg.className = 'warn';
                statusMsg.innerHTML = `✅ Enviado con advertencia.<br>RFC: ${rfcDetectado}<br>Total: ${totalDetect}`;
            } else {
                statusMsg.className = 'ok';
                statusMsg.innerHTML = `✅ <b>Éxito</b><br>RFC: ${rfcDetectado}<br>Total: ${totalDetect}<br>Fecha: ${ticketData.fecha}`;
            }

        } catch (error) {
            statusMsg.className = 'err';
            statusMsg.innerHTML = `❌ <b>Error:</b> ${error.message}<br><small>Ajusta brillo/contraste e intenta de nuevo.</small>`;
            console.error(error);
        }

        spinner.style.display   = 'none';
        uploadBtn.style.display = 'block';
    });
</script>
</body>
</html>
